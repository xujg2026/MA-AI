<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高射炮打飞机</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
    }

    #gameContainer {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(233, 69, 96, 0.3);
    }

    #gameCanvas {
      display: block;
      cursor: crosshair;
    }

    #ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #score {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fdcb6e;
      font-size: 24px;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(253, 203, 110, 0.5);
    }

    #lives {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
    }

    .life-icon {
      width: 24px;
      height: 24px;
      opacity: 1;
      transition: opacity 0.3s;
    }

    .life-icon.lost {
      opacity: 0.2;
    }

    #combo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #e17055;
      font-size: 48px;
      font-weight: 900;
      opacity: 0;
      text-shadow: 0 0 20px rgba(225, 112, 85, 0.8);
      transition: opacity 0.2s;
    }

    #combo.show {
      opacity: 1;
      animation: comboPulse 0.3s ease-out;
    }

    @keyframes comboPulse {
      0% { transform: translate(-50%, -50%) scale(1.5); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    #startScreen, #gameOverScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 26, 46, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: auto;
      transition: opacity 0.5s;
    }

    #startScreen h1, #gameOverScreen h1 {
      font-size: 48px;
      color: #e94560;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
    }

    #startScreen p {
      color: #dfe6e9;
      font-size: 14px;
      margin-bottom: 40px;
      opacity: 0.7;
    }

    #gameOverScreen h2 {
      font-size: 28px;
      color: #fdcb6e;
      margin-bottom: 20px;
    }

    #finalScore {
      font-size: 64px;
      color: #e94560;
      font-weight: 900;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 50px;
      font-size: 18px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #startBtn {
      background: linear-gradient(135deg, #e94560, #e17055);
      color: white;
      box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
    }

    #startBtn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(233, 69, 96, 0.6);
    }

    #restartBtn {
      background: linear-gradient(135deg, #00b894, #00cec9);
      color: white;
      box-shadow: 0 10px 30px rgba(0, 184, 148, 0.4);
    }

    #restartBtn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 184, 148, 0.6);
    }

    .hidden {
      opacity: 0;
      pointer-events: none !important;
    }

    #instructions {
      color: #636e72;
      font-size: 12px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="900" height="600"></canvas>

    <div id="ui">
      <div id="score">0</div>
      <div id="lives"></div>
      <div id="combo"></div>
    </div>

    <div id="startScreen">
      <h1>高射炮打飞机</h1>
      <p>Anti-Aircraft Artillery</p>
      <button id="startBtn" class="btn">开始游戏</button>
      <div id="instructions">鼠标瞄准 | 点击发射 | 空格暂停</div>
    </div>

    <div id="gameOverScreen" class="hidden">
      <h1>游戏结束</h1>
      <h2>最终得分</h2>
      <div id="finalScore">0</div>
      <button id="restartBtn" class="btn">再来一局</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const comboEl = document.getElementById('combo');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreEl = document.getElementById('finalScore');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    // Game state
    let gameRunning = false;
    let gamePaused = false;
    let score = 0;
    let lives = 5;
    let combo = 0;
    let comboTimer = 0;

    // Mouse state
    let mouseX = canvas.width / 2;
    let mouseY = canvas.height / 2;
    let mouseDown = false;

    // Game objects
    let cannon = null;
    let bullets = [];
    let planes = [];
    let explosions = [];
    let clouds = [];

    // Timing
    let lastBulletTime = 0;
    let lastPlaneTime = 0;
    let planeInterval = 1500;
    let lastTime = 0;

    // Plane types
    const planeTypes = [
      { speed: 2, points: 10, color: '#dfe6e9', name: 'slow' },
      { speed: 4, points: 20, color: '#74b9ff', name: 'medium' },
      { speed: 6, points: 30, color: '#fdcb6e', name: 'fast' }
    ];

    class Cannon {
      constructor() {
        this.x = canvas.width * 0.2;
        this.y = canvas.height - 60;
        this.angle = 0;
        this.targetAngle = 0;
        this.barrelLength = 50;
        this.lastShot = 0;
        this.shootCooldown = 333;
      }

      update(mx, my) {
        const dx = mx - this.x;
        const dy = my - this.y;
        this.targetAngle = Math.atan2(dy, dx);
        this.targetAngle = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, this.targetAngle));
        this.angle += (this.targetAngle - this.angle) * 0.15;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);

        // Base
        ctx.fillStyle = '#2d3436';
        ctx.beginPath();
        ctx.arc(0, 0, 35, Math.PI, 0);
        ctx.fill();

        // Base ring
        ctx.strokeStyle = '#636e72';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, 30, Math.PI, 0);
        ctx.stroke();

        // Barrel
        ctx.rotate(this.angle);

        // Barrel shadow
        ctx.fillStyle = '#4a5568';
        ctx.fillRect(0, -10, this.barrelLength + 5, 20);

        // Barrel main
        const gradient = ctx.createLinearGradient(0, -8, 0, 8);
        gradient.addColorStop(0, '#747d8c');
        gradient.addColorStop(0.5, '#636e72');
        gradient.addColorStop(1, '#4a5568');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, -8, this.barrelLength, 16);

        // Barrel tip
        ctx.fillStyle = '#d63031';
        ctx.fillRect(this.barrelLength - 8, -10, 12, 20);

        // Muzzle
        ctx.fillStyle = '#2d3436';
        ctx.fillRect(this.barrelLength - 3, -6, 6, 12);

        ctx.restore();

        // Draw base mount
        ctx.fillStyle = '#4a5568';
        ctx.beginPath();
        ctx.moveTo(this.x - 40, this.y);
        ctx.lineTo(this.x + 40, this.y);
        ctx.lineTo(this.x + 50, this.y + 20);
        ctx.lineTo(this.x - 50, this.y + 20);
        ctx.closePath();
        ctx.fill();
      }

      shoot() {
        const now = Date.now();
        if (now - this.lastShot < this.shootCooldown) return;
        this.lastShot = now;

        const speed = 12;
        const bx = this.x + Math.cos(this.angle) * this.barrelLength;
        const by = this.y + Math.sin(this.angle) * this.barrelLength;

        bullets.push({
          x: bx,
          y: by,
          vx: Math.cos(this.angle) * speed,
          vy: Math.sin(this.angle) * speed,
          radius: 6,
          trail: []
        });

        // Muzzle flash
        explosions.push({
          x: bx,
          y: by,
          particles: Array.from({ length: 8 }, () => ({
            x: bx,
            y: by,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 1,
            color: Math.random() > 0.5 ? '#fdcb6e' : '#e17055'
          })),
          type: 'flash'
        });
      }
    }

    class Plane {
      constructor() {
        const type = planeTypes[Math.floor(Math.random() * planeTypes.length)];
        this.x = canvas.width + 60;
        this.y = canvas.height * (0.3 + Math.random() * 0.4);
        this.speed = type.speed;
        this.points = type.points;
        this.color = type.color;
        this.width = 60;
        this.height = 20;
        this.trail = [];
        this.wobble = Math.random() * Math.PI * 2;
      }

      update() {
        this.x -= this.speed;
        this.wobble += 0.05;
        this.y += Math.sin(this.wobble) * 0.3;

        // Trail
        this.trail.push({ x: this.x + 30, y: this.y });
        if (this.trail.length > 15) this.trail.shift();
      }

      draw() {
        // Trail
        ctx.save();
        for (let i = 0; i < this.trail.length; i++) {
          const alpha = i / this.trail.length * 0.3;
          ctx.fillStyle = `rgba(223, 230, 233, ${alpha})`;
          ctx.beginPath();
          ctx.arc(this.trail[i].x, this.trail[i].y, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        ctx.save();
        ctx.translate(this.x, this.y);

        // Fuselage
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, 30, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // Cockpit
        ctx.fillStyle = '#74b9ff';
        ctx.beginPath();
        ctx.ellipse(10, -2, 8, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        // Wings
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.moveTo(-5, 0);
        ctx.lineTo(-15, -20);
        ctx.lineTo(5, -20);
        ctx.lineTo(10, 0);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(-5, 0);
        ctx.lineTo(-15, 20);
        ctx.lineTo(5, 20);
        ctx.lineTo(10, 0);
        ctx.closePath();
        ctx.fill();

        // Tail
        ctx.beginPath();
        ctx.moveTo(-25, 0);
        ctx.lineTo(-35, -12);
        ctx.lineTo(-25, -8);
        ctx.lineTo(-25, 0);
        ctx.closePath();
        ctx.fill();

        // Engine glow
        ctx.fillStyle = '#fdcb6e';
        ctx.shadowColor = '#fdcb6e';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.ellipse(-30, 0, 5, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.restore();
      }

      isOffScreen() {
        return this.x < -60;
      }
    }

    function createExplosion(x, y, color) {
      const particles = Array.from({ length: 20 }, () => ({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 12,
        vy: (Math.random() - 0.5) * 12,
        life: 1,
        color: color || (Math.random() > 0.33 ? '#fdcb6e' : Math.random() > 0.5 ? '#e17055' : '#d63031'),
        size: Math.random() * 8 + 4
      }));

      explosions.push({
        x, y,
        particles,
        type: 'explosion',
        life: 1
      });
    }

    function drawBackground() {
      // Sky gradient
      const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      skyGradient.addColorStop(0, '#1a1a2e');
      skyGradient.addColorStop(0.4, '#16213e');
      skyGradient.addColorStop(0.7, '#e94560');
      skyGradient.addColorStop(1, '#fdcb6e');
      ctx.fillStyle = skyGradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Stars
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      for (let i = 0; i < 50; i++) {
        const x = (i * 73) % canvas.width;
        const y = (i * 37) % (canvas.height * 0.5);
        const size = (i % 3) + 1;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }

      // Clouds
      ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
      clouds.forEach(cloud => {
        ctx.beginPath();
        ctx.arc(cloud.x, cloud.y, cloud.r, 0, Math.PI * 2);
        ctx.arc(cloud.x + cloud.r * 0.8, cloud.y - cloud.r * 0.3, cloud.r * 0.7, 0, Math.PI * 2);
        ctx.arc(cloud.x + cloud.r * 1.5, cloud.y, cloud.r * 0.8, 0, Math.PI * 2);
        ctx.fill();
      });

      // Mountains
      ctx.fillStyle = '#2d3436';
      ctx.beginPath();
      ctx.moveTo(0, canvas.height);
      ctx.lineTo(0, canvas.height - 80);
      ctx.lineTo(100, canvas.height - 150);
      ctx.lineTo(200, canvas.height - 100);
      ctx.lineTo(300, canvas.height - 180);
      ctx.lineTo(400, canvas.height - 120);
      ctx.lineTo(500, canvas.height - 200);
      ctx.lineTo(600, canvas.height - 140);
      ctx.lineTo(700, canvas.height - 170);
      ctx.lineTo(800, canvas.height - 110);
      ctx.lineTo(900, canvas.height - 160);
      ctx.lineTo(canvas.width, canvas.height);
      ctx.closePath();
      ctx.fill();

      // Ground
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
    }

    function updateLives() {
      livesEl.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('class', `life-icon ${i >= lives ? 'lost' : ''}`);
        svg.setAttribute('viewBox', '0 0 24 24');
        svg.innerHTML = `<path fill="#e94560" d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>`;
        livesEl.appendChild(svg);
      }
    }

    function showCombo(n) {
      if (n > 1) {
        comboEl.textContent = `${n} 连击!`;
        comboEl.classList.add('show');
        comboTimer = 60;
      }
    }

    function checkCollisions() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];

        for (let j = planes.length - 1; j >= 0; j--) {
          const plane = planes[j];

          // Circle collision
          const dx = bullet.x - plane.x;
          const dy = bullet.y - plane.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < bullet.radius + 30) {
            // Hit!
            createExplosion(plane.x, plane.y);
            combo++;
            const comboBonus = (combo - 1) * 5;
            score += plane.points + comboBonus;
            scoreEl.textContent = score;
            showCombo(combo);

            bullets.splice(i, 1);
            planes.splice(j, 1);
            break;
          }
        }
      }
    }

    function updateBullets() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];

        // Trail
        b.trail.push({ x: b.x, y: b.y });
        if (b.trail.length > 10) b.trail.shift();

        // Physics
        b.x += b.vx;
        b.y += b.vy;
        b.vy += 0.1; // Gravity

        // Remove if off screen or too old
        if (b.x > canvas.width + 50 || b.y > canvas.height + 50 || b.x < -50) {
          bullets.splice(i, 1);
        }
      }
    }

    function drawBullets() {
      bullets.forEach(b => {
        // Trail
        ctx.save();
        for (let i = 0; i < b.trail.length; i++) {
          const alpha = i / b.trail.length * 0.6;
          const size = (i / b.trail.length) * b.radius;
          ctx.fillStyle = `rgba(253, 203, 110, ${alpha})`;
          ctx.beginPath();
          ctx.arc(b.trail[i].x, b.trail[i].y, size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        // Bullet
        ctx.fillStyle = '#fdcb6e';
        ctx.shadowColor = '#e17055';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }

    function updateExplosions() {
      for (let i = explosions.length - 1; i >= 0; i--) {
        const exp = explosions[i];

        if (exp.type === 'flash') {
          exp.particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.15;
          });
          exp.particles = exp.particles.filter(p => p.life > 0);
          if (exp.particles.length === 0) explosions.splice(i, 1);
        } else {
          exp.particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2;
            p.life -= 0.03;
            p.vx *= 0.98;
          });
          exp.life -= 0.05;
          if (exp.life <= 0) explosions.splice(i, 1);
        }
      }
    }

    function drawExplosions() {
      explosions.forEach(exp => {
        exp.particles.forEach(p => {
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fill();
        });
      });
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    function spawnPlane() {
      planes.push(new Plane());
    }

    function update() {
      if (!gameRunning || gamePaused) return;

      const now = Date.now();

      // Spawn planes
      if (now - lastPlaneTime > planeInterval) {
        spawnPlane();
        lastPlaneTime = now;
        planeInterval = Math.max(600, planeInterval - 10);
      }

      // Shooting
      if (mouseDown) {
        cannon.shoot();
      }

      // Update
      cannon.update(mouseX, mouseY);
      updateBullets();

      planes.forEach(p => p.update());
      updateExplosions();
      checkCollisions();

      // Remove off-screen planes
      for (let i = planes.length - 1; i >= 0; i--) {
        if (planes[i].isOffScreen()) {
          planes.splice(i, 1);
          lives--;
          combo = 0;
          updateLives();

          if (lives <= 0) {
            gameOver();
          }
        }
      }

      // Combo timer
      if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer === 0) {
          comboEl.classList.remove('show');
        }
      }

      // Move clouds
      clouds.forEach(c => {
        c.x -= c.speed;
        if (c.x < -100) c.x = canvas.width + 100;
      });
    }

    function draw() {
      drawBackground();

      planes.forEach(p => p.draw());
      drawBullets();
      drawExplosions();
      cannon.draw();
    }

    function gameLoop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = timestamp - lastTime;
      lastTime = timestamp;

      update();
      draw();

      requestAnimationFrame(gameLoop);
    }

    function gameOver() {
      gameRunning = false;
      finalScoreEl.textContent = score;
      gameOverScreen.classList.remove('hidden');
    }

    function startGame() {
      score = 0;
      lives = 5;
      combo = 0;
      bullets = [];
      planes = [];
      explosions = [];
      planeInterval = 1500;
      lastPlaneTime = 0;
      cannon = new Cannon();

      scoreEl.textContent = '0';
      updateLives();
      comboEl.classList.remove('show');

      startScreen.classList.add('hidden');
      gameOverScreen.classList.add('hidden');

      gameRunning = true;
    }

    // Event listeners
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
    });

    canvas.addEventListener('mousedown', e => {
      if (e.button === 0) mouseDown = true;
    });

    canvas.addEventListener('mouseup', e => {
      if (e.button === 0) mouseDown = false;
    });

    canvas.addEventListener('mouseleave', () => {
      mouseDown = false;
    });

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (gameRunning) {
          gamePaused = !gamePaused;
        }
      }
    });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    // Initialize clouds
    for (let i = 0; i < 5; i++) {
      clouds.push({
        x: Math.random() * canvas.width,
        y: 50 + Math.random() * 150,
        r: 30 + Math.random() * 40,
        speed: 0.2 + Math.random() * 0.3
      });
    }

    // Initial draw
    cannon = new Cannon();
    draw();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
