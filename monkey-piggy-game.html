<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>孙悟空大战猪八戒</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'ZCOOL KuaiLe', cursive;
      overflow: hidden;
    }

    #gameContainer {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(233, 69, 96, 0.4), 0 0 120px rgba(253, 203, 110, 0.2);
    }

    #gameCanvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #timer {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 32px;
      color: #fdcb6e;
      text-shadow: 0 0 20px rgba(253, 203, 110, 0.8), 2px 2px 4px rgba(0,0,0,0.5);
    }

    .health-bar {
      position: absolute;
      top: 20px;
      width: 200px;
      padding: 8px 15px;
      background: rgba(0,0,0,0.6);
      border-radius: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #playerHealth {
      left: 20px;
      border: 2px solid #e17055;
    }

    #enemyHealth {
      right: 20px;
      border: 2px solid #00b894;
      flex-direction: row-reverse;
    }

    .health-bar .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    #playerHealth .avatar {
      background: linear-gradient(135deg, #fdcb6e, #e17055);
    }

    #enemyHealth .avatar {
      background: linear-gradient(135deg, #00b894, #00cec9);
    }

    .health-bar .bar-container {
      flex: 1;
      height: 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .health-bar .bar {
      height: 100%;
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    #playerHealth .bar {
      background: linear-gradient(90deg, #d63031, #e17055);
    }

    #enemyHealth .bar {
      background: linear-gradient(90deg, #00cec9, #00b894);
    }

    .health-bar .label {
      color: white;
      font-size: 16px;
      min-width: 60px;
      text-align: center;
    }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      pointer-events: auto;
    }

    .skill-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid;
      font-size: 28px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
    }

    .skill-btn:hover {
      transform: scale(1.15);
    }

    .skill-btn:active {
      transform: scale(0.95);
    }

    .skill-btn.cooldown {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #skill1 { border-color: #fdcb6e; }
    #skill2 { border-color: #e17055; }
    #skill3 { border-color: #74b9ff; }
    #skill4 { border-color: #a29bfe; }

    .skill-btn .cd-text {
      position: absolute;
      font-size: 14px;
      color: white;
      font-family: sans-serif;
    }

    #startScreen, #gameOverScreen, #victoryScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 26, 46, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: auto;
    }

    #startScreen h1 {
      font-size: 56px;
      background: linear-gradient(135deg, #fdcb6e, #e17055);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      margin-bottom: 20px;
    }

    #startScreen .subtitle {
      font-size: 24px;
      color: #dfe6e9;
      margin-bottom: 40px;
    }

    #gameOverScreen h1, #victoryScreen h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    #gameOverScreen h1 {
      color: #d63031;
    }

    #victoryScreen h1 {
      color: #fdcb6e;
    }

    .result-score {
      font-size: 72px;
      color: #e17055;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 50px;
      font-size: 20px;
      font-family: 'ZCOOL KuaiLe', cursive;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
      margin: 10px;
    }

    #startBtn {
      background: linear-gradient(135deg, #fdcb6e, #e17055);
      color: white;
      box-shadow: 0 10px 30px rgba(241, 121, 68, 0.5);
    }

    #startBtn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(241, 121, 68, 0.7);
    }

    #restartBtn {
      background: linear-gradient(135deg, #00b894, #00cec9);
      color: white;
      box-shadow: 0 10px 30px rgba(0, 184, 148, 0.5);
    }

    #restartBtn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0, 184, 148, 0.7);
    }

    .hidden {
      display: none !important;
    }

    #instructions {
      color: #636e72;
      font-size: 14px;
      margin-top: 30px;
    }

    .character-preview {
      display: flex;
      gap: 60px;
      margin-bottom: 40px;
    }

    .preview-char {
      text-align: center;
    }

    .preview-char .emoji {
      font-size: 64px;
      margin-bottom: 10px;
    }

    .preview-char .name {
      font-size: 20px;
      color: #dfe6e9;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="900" height="600"></canvas>

    <div id="ui">
      <div id="timer">60</div>

      <div id="playerHealth" class="health-bar">
        <div class="avatar">🐵</div>
        <div class="bar-container">
          <div class="bar" id="playerBar" style="width: 100%"></div>
        </div>
        <div class="label">孙悟空</div>
      </div>

      <div id="enemyHealth" class="health-bar">
        <div class="avatar">🐷</div>
        <div class="bar-container">
          <div class="bar" id="enemyBar" style="width: 100%"></div>
        </div>
        <div class="label">猪八戒</div>
      </div>

      <div id="controls">
        <button id="skill1" class="skill-btn" title="普通攻击">👊</button>
        <button id="skill2" class="skill-btn" title="金箍棒">⚡</button>
        <button id="skill3" class="skill-btn" title="筋斗云">☁️</button>
        <button id="skill4" class="skill-btn" title="七十二变">🔮</button>
      </div>
    </div>

    <div id="startScreen">
      <h1>孙悟空大战猪八戒</h1>
      <p class="subtitle">西天取经路上的师兄弟对决</p>
      <div class="character-preview">
        <div class="preview-char">
          <div class="emoji">🐵</div>
          <div class="name">孙悟空</div>
        </div>
        <div class="preview-char">
          <div class="emoji">🐷</div>
          <div class="name">猪八戒</div>
        </div>
      </div>
      <button id="startBtn" class="btn">开始战斗</button>
      <div id="instructions">
        按 1/2/3/4 或点击按钮释放技能<br>
        普通攻击冷却快，其他技能冷却较长
      </div>
    </div>

    <div id="gameOverScreen" class="hidden">
      <h1>你输了！</h1>
      <p style="color: #dfe6e9; margin-bottom: 20px;">猪八戒获胜</p>
      <div class="result-score">💩</div>
      <button id="restartBtn" class="btn">再来一局</button>
    </div>

    <div id="victoryScreen" class="hidden">
      <h1>你赢了！</h1>
      <p style="color: #dfe6e9; margin-bottom: 20px;">孙悟空获胜</p>
      <div class="result-score">🏆</div>
      <button id="restartBtn2" class="btn">再来一局</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game state
    let gameRunning = false;
    let gameTime = 60;
    let timerInterval = null;

    // Player (Sun Wukong)
    let player = {
      x: 150,
      y: 350,
      width: 80,
      height: 100,
      hp: 100,
      maxHp: 100,
      speed: 6,
      vx: 0,
      vy: 0,
      facing: 1,
      isAttacking: false,
      attackFrame: 0,
      invincible: 0,
      skills: {
        skill1: { cd: 0, maxCd: 500, damage: 8, name: '普通攻击' },
        skill2: { cd: 0, maxCd: 2000, damage: 25, name: '金箍棒' },
        skill3: { cd: 0, maxCd: 3000, damage: 15, name: '筋斗云' },
        skill4: { cd: 0, maxCd: 5000, damage: 35, name: '七十二变' }
      }
    };

    // Enemy (Zhu Bajie)
    let enemy = {
      x: 700,
      y: 350,
      width: 90,
      height: 110,
      hp: 120,
      maxHp: 120,
      speed: 3,
      vx: 0,
      vy: 0,
      facing: -1,
      isAttacking: false,
      attackFrame: 0,
      invincible: 0,
      actionTimer: 0,
      currentAction: 'idle'
    };

    // Effects
    let effects = [];
    let particles = [];

    // Input
    const keys = {};

    // Event listeners
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key >= '1' && e.key <= '4') {
        useSkill(`skill${e.key}`);
      }
    });

    document.addEventListener('keyup', e => {
      keys[e.key] = false;
    });

    document.getElementById('skill1').addEventListener('click', () => useSkill('skill1'));
    document.getElementById('skill2').addEventListener('click', () => useSkill('skill2'));
    document.getElementById('skill3').addEventListener('click', () => useSkill('skill3'));
    document.getElementById('skill4').addEventListener('click', () => useSkill('skill4'));

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn2').addEventListener('click', startGame);

    function useSkill(skillName) {
      if (!gameRunning) return;
      const skill = player.skills[skillName];
      if (skill.cd > 0) return;

      skill.cd = skill.maxCd;
      player.isAttacking = true;
      player.attackFrame = 0;

      const dx = enemy.x - player.x;
      const dist = Math.abs(dx);

      switch(skillName) {
        case 'skill1':
          // Quick punch
          createEffect(player.x + 40 * player.facing, player.y + 30, '💥', 20);
          if (dist < 100) dealDamage(enemy, skill.damage);
          break;
        case 'skill2':
          // Golden staff strike
          for (let i = 0; i < 5; i++) {
            setTimeout(() => {
              createEffect(enemy.x + (Math.random() - 0.5) * 60, enemy.y + (Math.random() - 0.5) * 60, '⚡', 30);
            }, i * 100);
          }
          if (dist < 150) dealDamage(enemy, skill.damage);
          break;
        case 'skill3':
          // Cloud dash + attack
          player.x += 150 * player.facing;
          createEffect(player.x, player.y + 50, '☁️', 25);
          if (dist < 200) dealDamage(enemy, skill.damage);
          break;
        case 'skill4':
          // Transform storm
          for (let i = 0; i < 8; i++) {
            setTimeout(() => {
              const angle = (i / 8) * Math.PI * 2;
              const px = player.x + Math.cos(angle) * 80;
              const py = player.y + Math.sin(angle) * 80;
              createEffect(px, py, '🔮', 25);
            }, i * 80);
          }
          if (dist < 120) dealDamage(enemy, skill.damage * 1.5);
          break;
      }
    }

    function dealDamage(target, damage) {
      if (target.invincible > 0) return;
      target.hp -= damage;
      target.invincible = 15;

      // Knockback
      target.x += (target.x > player.x ? 1 : -1) * 30;

      // Particles
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: target.x,
          y: target.y + target.height / 2,
          vx: (Math.random() - 0.5) * 10,
          vy: (Math.random() - 0.5) * 10 - 3,
          life: 1,
          color: target === player ? '#e17055' : '#00b894',
          size: 5 + Math.random() * 5
        });
      }

      updateHealthBars();

      if (target.hp <= 0) {
        endGame(target === enemy);
      }
    }

    function createEffect(x, y, emoji, size) {
      effects.push({
        x, y, emoji, size,
        life: 1,
        vy: -2
      });
    }

    function updateHealthBars() {
      document.getElementById('playerBar').style.width = `${(player.hp / player.maxHp) * 100}%`;
      document.getElementById('enemyBar').style.width = `${(enemy.hp / enemy.maxHp) * 100}%`;
    }

    function updateSkillCds(dt) {
      for (let skill in player.skills) {
        if (player.skills[skill].cd > 0) {
          player.skills[skill].cd -= dt;
          if (player.skills[skill].cd < 0) player.skills[skill].cd = 0;
        }
      }

      // Update button states
      for (let i = 1; i <= 4; i++) {
        const btn = document.getElementById(`skill${i}`);
        const cd = player.skills[`skill${i}`].cd;
        const maxCd = player.skills[`skill${i}`].maxCd;
        if (cd > 0) {
          btn.classList.add('cooldown');
          btn.innerHTML = `<span class="cd-text">${Math.ceil(cd / 1000)}</span>${btn.innerHTML.charAt(0)}`;
        } else {
          btn.classList.remove('cooldown');
          const icons = ['👊', '⚡', '☁️', '🔮'];
          btn.innerHTML = icons[i - 1];
        }
      }
    }

    function updatePlayer(dt) {
      // Movement
      player.vx = 0;
      if (keys['a'] || keys['A'] || keys['ArrowLeft']) player.vx = -player.speed;
      if (keys['d'] || keys['D'] || keys['ArrowRight']) player.vx = player.speed;
      if (keys['w'] || keys['W'] || keys['ArrowUp']) player.vy = -player.speed;
      if (keys['s'] || keys['S'] || keys['ArrowDown']) player.vy = player.speed;

      player.x += player.vx;
      player.y += player.vy;

      // Boundaries
      player.x = Math.max(50, Math.min(canvas.width - 50, player.x));
      player.y = Math.max(200, Math.min(canvas.height - 100, player.y));

      // Facing
      if (player.vx > 0) player.facing = 1;
      if (player.vx < 0) player.facing = -1;

      // Invincibility
      if (player.invincible > 0) player.invincible--;

      // Attack animation
      if (player.isAttacking) {
        player.attackFrame++;
        if (player.attackFrame > 15) {
          player.isAttacking = false;
          player.attackFrame = 0;
        }
      }
    }

    function updateEnemy(dt) {
      enemy.actionTimer -= dt;

      if (enemy.actionTimer <= 0) {
        // Choose new action
        const actions = ['idle', 'approach', 'retreat', 'attack'];
        const weights = [0.2, 0.3, 0.2, 0.3];
        let r = Math.random();
        let cumulative = 0;
        for (let i = 0; i < actions.length; i++) {
          cumulative += weights[i];
          if (r < cumulative) {
            enemy.currentAction = actions[i];
            break;
          }
        }
        enemy.actionTimer = 500 + Math.random() * 1000;
      }

      const dx = player.x - enemy.x;
      const dist = Math.abs(dx);
      enemy.facing = dx > 0 ? 1 : -1;

      switch(enemy.currentAction) {
        case 'approach':
          if (dist > 100) {
            enemy.x += enemy.facing * enemy.speed;
          }
          break;
        case 'retreat':
          if (dist < 200) {
            enemy.x -= enemy.facing * enemy.speed;
          }
          break;
        case 'attack':
          if (dist < 100 && player.invincible === 0) {
            dealDamage(player, 10 + Math.random() * 10);
            enemy.isAttacking = true;
            enemy.attackFrame = 0;
          }
          break;
      }

      // Boundaries
      enemy.x = Math.max(50, Math.min(canvas.width - 50, enemy.x));
      enemy.y = Math.max(200, Math.min(canvas.height - 100, enemy.y));

      // Invincibility
      if (enemy.invincible > 0) enemy.invincible--;

      // Attack animation
      if (enemy.isAttacking) {
        enemy.attackFrame++;
        if (enemy.attackFrame > 20) {
          enemy.isAttacking = false;
          enemy.attackFrame = 0;
        }
      }
    }

    function updateEffects() {
      for (let i = effects.length - 1; i >= 0; i--) {
        effects[i].y += effects[i].vy;
        effects[i].life -= 0.03;
        if (effects[i].life <= 0) effects.splice(i, 1);
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].x += particles[i].vx;
        particles[i].y += particles[i].vy;
        particles[i].vy += 0.3;
        particles[i].life -= 0.03;
        if (particles[i].life <= 0) particles.splice(i, 1);
      }
    }

    function drawBackground() {
      // Sky
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#87CEEB');
      gradient.addColorStop(0.5, '#FDB99B');
      gradient.addColorStop(1, '#CF8F6C');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Clouds
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      drawCloud(100, 80, 40);
      drawCloud(300, 120, 30);
      drawCloud(600, 90, 50);
      drawCloud(800, 140, 35);

      // Mountains
      ctx.fillStyle = '#6B8E6B';
      ctx.beginPath();
      ctx.moveTo(0, canvas.height);
      ctx.lineTo(0, 450);
      ctx.lineTo(150, 350);
      ctx.lineTo(300, 420);
      ctx.lineTo(450, 320);
      ctx.lineTo(600, 400);
      ctx.lineTo(750, 340);
      ctx.lineTo(900, 400);
      ctx.lineTo(canvas.width, canvas.height);
      ctx.closePath();
      ctx.fill();

      // Ground
      ctx.fillStyle = '#8FBC8F';
      ctx.fillRect(0, 480, canvas.width, 120);

      // Grass tufts
      ctx.fillStyle = '#228B22';
      for (let i = 0; i < 20; i++) {
        const x = i * 50 + 20;
        ctx.beginPath();
        ctx.moveTo(x, 480);
        ctx.lineTo(x + 5, 470);
        ctx.lineTo(x + 10, 480);
        ctx.fill();
      }
    }

    function drawCloud(x, y, size) {
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.arc(x + size * 0.8, y - size * 0.2, size * 0.7, 0, Math.PI * 2);
      ctx.arc(x + size * 1.5, y, size * 0.8, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawCharacter(char, isPlayer) {
      ctx.save();
      ctx.translate(char.x, char.y);
      ctx.scale(char.facing, 1);

      // Invincibility flash
      if (char.invincible > 0 && char.invincible % 4 < 2) {
        ctx.globalAlpha = 0.5;
      }

      if (isPlayer) {
        // Sun Wukong
        // Body
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-20, 0, 40, 50);

        // Golden armor
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(-25, 5, 50, 40);

        // Head
        ctx.fillStyle = '#DEB887';
        ctx.beginPath();
        ctx.arc(0, -20, 25, 0, Math.PI * 2);
        ctx.fill();

        // Face
        ctx.fillStyle = '#DEB887';
        ctx.beginPath();
        ctx.arc(0, -15, 20, 0, Math.PI * 2);
        ctx.fill();

        // Eyes
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(-8, -20, 4, 0, Math.PI * 2);
        ctx.arc(8, -20, 4, 0, Math.PI * 2);
        ctx.fill();

        // Smile
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, -12, 10, 0.2, Math.PI - 0.2);
        ctx.stroke();

        // Phoenix crown (feather crown)
        ctx.fillStyle = '#FF4500';
        ctx.beginPath();
        ctx.moveTo(-5, -45);
        ctx.lineTo(0, -70);
        ctx.lineTo(5, -45);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.moveTo(-8, -45);
        ctx.lineTo(-3, -60);
        ctx.lineTo(2, -45);
        ctx.closePath();
        ctx.fill();

        // Legs
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-18, 50, 14, 30);
        ctx.fillRect(4, 50, 14, 30);

        // Attack animation
        if (char.isAttacking) {
          const extend = Math.sin(char.attackFrame / 15 * Math.PI) * 40;
          ctx.fillStyle = '#FFD700';
          ctx.fillRect(20, 10, extend, 12);
          ctx.fillStyle = '#FF4500';
          ctx.beginPath();
          ctx.arc(20 + extend, 16, 8, 0, Math.PI * 2);
          ctx.fill();
        }
      } else {
        // Zhu Bajie
        // Fat body
        ctx.fillStyle = '#FFB6C1';
        ctx.beginPath();
        ctx.ellipse(0, 20, 45, 55, 0, 0, Math.PI * 2);
        ctx.fill();

        // Armor
        ctx.fillStyle = '#90EE90';
        ctx.beginPath();
        ctx.ellipse(0, 25, 38, 45, 0, 0, Math.PI * 2);
        ctx.fill();

        // Head
        ctx.fillStyle = '#FFB6C1';
        ctx.beginPath();
        ctx.arc(0, -35, 30, 0, Math.PI * 2);
        ctx.fill();

        // Big ears
        ctx.fillStyle = '#FFB6C1';
        ctx.beginPath();
        ctx.ellipse(-35, -35, 15, 20, 0, 0, Math.PI * 2);
        ctx.ellipse(35, -35, 15, 20, 0, 0, Math.PI * 2);
        ctx.fill();

        // Pig snout
        ctx.fillStyle = '#FF69B4';
        ctx.beginPath();
        ctx.ellipse(0, -25, 18, 14, 0, 0, Math.PI * 2);
        ctx.fill();

        // Nostrils
        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.arc(-6, -25, 4, 0, Math.PI * 2);
        ctx.arc(6, -25, 4, 0, Math.PI * 2);
        ctx.fill();

        // Eyes
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(-10, -42, 5, 0, Math.PI * 2);
        ctx.arc(10, -42, 5, 0, Math.PI * 2);
        ctx.fill();

        // Disappointed mouth
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, -15, 8, Math.PI + 0.3, -0.3);
        ctx.stroke();

        // Legs
        ctx.fillStyle = '#FFB6C1';
        ctx.fillRect(-30, 70, 20, 25);
        ctx.fillRect(10, 70, 20, 25);

        // Hat
        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.ellipse(0, -65, 25, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(-15, -75, 30, 15);

        // rake (九齿钉耙)
        if (char.isAttacking) {
          const extend = Math.sin(char.attackFrame / 20 * Math.PI) * 50;
          ctx.fillStyle = '#8B4513';
          ctx.fillRect(30, 0, extend, 8);
          // Prongs
          ctx.fillStyle = '#C0C0C0';
          for (let i = 0; i < 3; i++) {
            ctx.fillRect(30 + extend - 5, -10 + i * 8, 10, 4);
          }
        }
      }

      ctx.restore();
    }

    function drawEffects() {
      effects.forEach(e => {
        ctx.globalAlpha = e.life;
        ctx.font = `${e.size}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(e.emoji, e.x, e.y);
      });

      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.globalAlpha = 1;
    }

    let lastTime = 0;
    function gameLoop(timestamp) {
      const dt = timestamp - lastTime;
      lastTime = timestamp;

      if (gameRunning) {
        updatePlayer(dt);
        updateEnemy(dt);
        updateEffects();
        updateSkillCds(dt);
      }

      drawBackground();
      drawCharacter(player, true);
      drawCharacter(enemy, false);
      drawEffects();

      requestAnimationFrame(gameLoop);
    }

    function startGame() {
      player.hp = player.maxHp;
      enemy.hp = enemy.maxHp;
      player.x = 150;
      player.y = 350;
      enemy.x = 700;
      enemy.y = 350;
      gameTime = 60;
      effects = [];
      particles = [];
      gameRunning = true;

      updateHealthBars();

      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('gameOverScreen').classList.add('hidden');
      document.getElementById('victoryScreen').classList.add('hidden');

      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (gameRunning) {
          gameTime--;
          document.getElementById('timer').textContent = gameTime;
          if (gameTime <= 0) {
            endGame(player.hp > enemy.hp);
          }
        }
      }, 1000);
    }

    function endGame(playerWon) {
      gameRunning = false;
      clearInterval(timerInterval);

      if (playerWon) {
        document.getElementById('victoryScreen').classList.remove('hidden');
      } else {
        document.getElementById('gameOverScreen').classList.remove('hidden');
      }
    }

    // Start
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
